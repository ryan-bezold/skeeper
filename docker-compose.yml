services:
  postgres:
    image: postgres:16-alpine
    container_name: skeeper-postgres
    environment:
      POSTGRES_DB: skeeper
      POSTGRES_USER: skeeper
      POSTGRES_PASSWORD: skeeper_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U skeeper']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: development
    container_name: skeeper-backend
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: skeeper
      DATABASE_USER: skeeper
      DATABASE_PASSWORD: skeeper_dev_password
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./apps/backend/tsconfig.json:/app/apps/backend/tsconfig.json
      - ./apps/backend/nest-cli.json:/app/apps/backend/nest-cli.json
      - backend_node_modules:/app/node_modules
      - backend_app_node_modules:/app/apps/backend/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: development
    container_name: skeeper-frontend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - '5173:5173'
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/index.html:/app/apps/frontend/index.html
      - ./apps/frontend/vite.config.ts:/app/apps/frontend/vite.config.ts
      - ./apps/frontend/tsconfig.json:/app/apps/frontend/tsconfig.json
      - ./apps/frontend/tsconfig.node.json:/app/apps/frontend/tsconfig.node.json
      - frontend_node_modules:/app/node_modules
      - frontend_app_node_modules:/app/apps/frontend/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_node_modules:
  backend_app_node_modules:
  frontend_node_modules:
  frontend_app_node_modules:
